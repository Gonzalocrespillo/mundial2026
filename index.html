<title>Mundial 2026</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f4f6f9;
  color: #142540;
  min-height: 100vh;
  -webkit-text-size-adjust: 100%;
}

.header {
  background: #ffffff;
  padding: 18px 16px 14px;
  text-align: center;
  border-bottom: 2px solid #c9a227;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header h1 { font-size: 24px; font-weight: 900; color: #142540; letter-spacing: 2px; }
.header p { color: #6b7d99; font-size: 12px; margin-top: 4px; }

.tabs {
  display: flex;
  overflow-x: auto;
  background: #ffffff;
  padding: 10px 10px;
  gap: 6px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  border-bottom: 1px solid #e3e8f0;
  position: sticky;
  top: 68px;
  z-index: 100;
}
.tabs::-webkit-scrollbar { display: none; }

.tab-btn {
  flex-shrink: 0;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1px solid #d7deea;
  background: #ffffff;
  color: #6b7d99;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.tab-btn.active {
  background: #142540;
  color: #fff;
  border-color: #142540;
}

.content { padding: 14px 12px 40px; }

.group-title {
  font-size: 18px;
  font-weight: 900;
  color: #142540;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.teams-row {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 16px;
}
.team-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #ffffff;
  border: 1px solid #e3e8f0;
  border-radius: 20px;
  padding: 6px 14px 6px 8px;
  font-size: 14px;
  font-weight: 700;
  color: #142540;
}
.team-badge img { width: 26px; height: 18px; border-radius: 3px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); display:block; }

/* Standings */
.standings {
  background: #ffffff;
  border: 1px solid #e3e8f0;
  border-radius: 14px;
  padding: 10px 10px 6px;
  margin-bottom: 16px;
  box-shadow: 0 1px 3px rgba(20,37,64,0.05);
}
.standings-title {
  font-size: 12px;
  font-weight: 800;
  color: #8a9bb5;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 2px 4px 8px;
}
.standings-row {
  display: grid;
  grid-template-columns: 18px 1fr 28px 32px 32px;
  align-items: center;
  gap: 6px;
  padding: 7px 4px;
  border-radius: 8px;
  font-size: 13px;
}
.standings-row.qualified { background: #e3f7e9; }
.standings-row .pos { font-weight: 800; color: #8a9bb5; font-size: 12px; }
.standings-row.qualified .pos { color: #19873f; }
.standings-team { display: flex; align-items: center; gap: 6px; font-weight: 700; }
.standings-team img { width: 20px; height: 14px; border-radius: 2px; object-fit: cover; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); }
.standings-num { text-align: center; font-weight: 700; color: #344865; font-size: 12px; }
.standings-head {
  display: grid;
  grid-template-columns: 18px 1fr 28px 32px 32px;
  gap: 6px;
  padding: 0 4px 4px;
  font-size: 10px;
  font-weight: 800;
  color: #aab8cc;
  text-transform: uppercase;
}
.standings-head span { text-align: center; }
.standings-head span:first-child, .standings-head span:nth-child(2) { text-align: left; }
.standings-note { font-size: 11px; color: #aab8cc; padding: 6px 4px 2px; }

.matchday-label {
  font-size: 11px;
  font-weight: 800;
  color: #8a9bb5;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin: 14px 0 7px;
}

.match-card {
  background: #ffffff;
  border: 1px solid #e3e8f0;
  border-radius: 14px;
  padding: 16px 12px;
  margin-bottom: 8px;
  box-shadow: 0 1px 3px rgba(20,37,64,0.05);
}
.match-card.played { border-left: 3px solid #1ea34c; }

.match-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.match-meta .date-time { font-size: 11px; color: #6b7d99; }
.match-meta .date-time span { font-weight: 700; color: #344865; }
.badge {
  font-size: 10px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 10px;
  text-transform: uppercase;
}
.badge-played { background: #e3f7e9; color: #19873f; }
.badge-upcoming { background: #e8effc; color: #2563eb; }

.match-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.team {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  width: 38%;
}
.flag-img {
  width: 64px;
  height: 44px;
  object-fit: cover;
  border-radius: 6px;
  box-shadow: 0 1px 4px rgba(20,37,64,0.18), 0 0 0 1px rgba(20,37,64,0.06);
  display: block;
}
.flag-img.dim { opacity: 0.45; }
.team-name { font-size: 15px; font-weight: 800; text-align: center; color: #142540; line-height: 1.15; }
.team-name.winner { color: #19873f; }
.team-name.loser { color: #aab8cc; }
.win-check { color: #19873f; font-size: 13px; }

.score-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  width: 24%;
}
.score-display {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 26px;
  font-weight: 900;
  color: #142540;
}
.score-display .sep { color: #c9a227; }
.score-display.pending { color: #c2cbdb; font-size: 20px; }
.vs-label { color: #aab8cc; font-size: 11px; font-weight: 600; }

/* Knockout */
.ko-round-title {
  font-size: 15px;
  font-weight: 800;
  color: #142540;
  margin: 20px 0 6px;
  padding-bottom: 6px;
  border-bottom: 1px solid #e3e8f0;
}
.ko-date { font-size: 11px; color: #8a9bb5; margin-bottom: 10px; }
.ko-flag-placeholder {
  width: 64px; height: 44px;
  border-radius: 6px;
  background: #eef1f6;
  border: 1px dashed #c2cbdb;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  color: #c2cbdb;
}
.ko-pending-name { font-size: 13px; font-weight: 600; color: #c2cbdb; text-align: center; }

.footer { text-align: center; padding: 16px; color: #aab8cc; font-size: 11px; }

  ]},
  { name: "Cuartos de Final", range: "9 – 11 Jul", matches: [
    {d:"9 Jul",t:"22:00",venue:"Foxborough, MA"},
    {d:"10 Jul",t:"21:00",venue:"Inglewood, CA"},
    {d:"11 Jul",t:"23:00",venue:"Miami Gardens, FL"},
    {d:"12 Jul",t:"03:00",venue:"Kansas City, MO"},
  ]},
  { name: "Semifinales", range: "14 – 15 Jul", matches: [
    {d:"14 Jul",t:"21:00",venue:"Arlington, TX"},
    {d:"15 Jul",t:"21:00",venue:"Atlanta"},
  ]},
  { name: "Tercer Puesto", range: "18 Jul", matches: [
    {d:"18 Jul",t:"23:00",venue:"Miami Gardens, FL"},
  ]},
  { name: "Final", range: "19 Jul · MetLife Stadium, Nueva York", matches: [
    {d:"19 Jul",t:"21:00",venue:"East Rutherford, NJ"},
  ]},
];

function matchCard(m) {
  const sh = m.sh, sa = m.sa;
  const played = sh !== undefined && sa !== undefined;
  let hClass = '', aClass = '', hCheck = '', aCheck = '';
  if (played) {
    const shN = parseInt(sh, 10), saN = parseInt(sa, 10);
    if (shN > saN) { hClass = 'winner'; aClass = 'loser'; hCheck = ' <span class="win-check">✓</span>'; }
    else if (saN > shN) { aClass = 'winner'; hClass = 'loser'; aCheck = ' <span class="win-check">✓</span>'; }
  }
  const scoreHtml = played
    ? `<div class="score-display"><span>${sh}</span><span class="sep">:</span><span>${sa}</span></div>`
    : `<div class="score-display pending"><span>–</span><span class="sep">:</span><span>–</span></div>`;
  return `
  <div class="match-card ${played ? 'played' : ''}">
    <div class="match-meta">
      <div class="date-time">📅 <span>${m.d}</span> &nbsp;⏰ <span>${m.t}</span></div>
      <span class="badge ${played ? 'badge-played' : 'badge-upcoming'}">${played ? '✓ Jugado' : 'Próximo'}</span>
    </div>
    <div class="match-row">
      <div class="team">
        <img class="flag-img ${aClass === '' ? '' : (hClass === 'loser' ? 'dim' : '')}" src="${flagUrl(m.hf)}" alt="${m.h}">
        <span class="team-name ${hClass}">${m.h}${hCheck}</span>
      </div>
      <div class="score-box">
        ${scoreHtml}
        <span class="vs-label">vs</span>
      </div>
      <div class="team">
        <img class="flag-img ${hClass === 'loser' ? '' : (aClass === 'loser' ? 'dim' : '')}" src="${flagUrl(m.af)}" alt="${m.a}">
        <span class="team-name ${aClass}">${m.a}${aCheck}</span>
      </div>
    </div>
  </div>`;
}

function computeStandings(group) {
  const flagByName = {};
  group.teams.forEach(t => flagByName[t.n] = t.f);
  const stats = {};
  group.teams.forEach(t => stats[t.n] = { name: t.n, flag: t.f, pj: 0, w: 0, d: 0, l: 0, gf: 0, ga: 0 });
  let playedCount = 0;
  group.matches.forEach(m => {
    if (m.sh === undefined || m.sa === undefined) return;
    playedCount++;
    const sh = parseInt(m.sh, 10), sa = parseInt(m.sa, 10);
    const home = stats[m.h], away = stats[m.a];
    home.pj++; away.pj++;
    home.gf += sh; home.ga += sa;
    away.gf += sa; away.ga += sh;
    if (sh > sa) { home.w++; away.l++; }
    else if (sa > sh) { away.w++; home.l++; }
    else { home.d++; away.d++; }
  });
  const rows = Object.values(stats).map(s => ({ ...s, gd: s.gf - s.ga, pts: s.w * 3 + s.d }));
  rows.sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf);
  return { rows, playedCount, totalMatches: group.matches.length };
}

function renderStandings(group) {
  const { rows, playedCount, totalMatches } = computeStandings(group);
  let h = `<div class="standings">
    <div class="standings-title">Clasificación</div>
    <div class="standings-head"><span>#</span><span>Equipo</span><span>PJ</span><span>DG</span><span>Pts</span></div>`;
  rows.forEach((r, i) => {
    h += `
    <div class="standings-row ${i < 2 ? 'qualified' : ''}">
      <span class="pos">${i + 1}</span>
      <span class="standings-team"><img src="${flagUrl(r.flag)}" alt="${r.name}">${r.name}</span>
      <span class="standings-num">${r.pj}</span>
      <span class="standings-num">${r.gd > 0 ? '+' : ''}${r.gd}</span>
      <span class="standings-num">${r.pts}</span>
    </div>`;
  });
  h += `<div class="standings-note">${playedCount < totalMatches ? `Provisional (${playedCount}/${totalMatches} jugados)` : 'Fase de grupos finalizada'} · verde = clasificados</div>`;
  h += '</div>';
  return h;
}

function renderGroup(key) {
  const g = G[key];
  let h = `<div class="group-title">🏆 ${g.name}</div>`;
  h += '<div class="teams-row">';
  g.teams.forEach(t => h += `<div class="team-badge"><img src="${flagUrl(t.f)}" alt="${t.n}">${t.n}</div>`);
  h += '</div>';
  h += renderStandings(g);
  ['Jornada 1','Jornada 2','Jornada 3'].forEach((lbl,i) => {
    h += `<div class="matchday-label">${lbl}</div>`;
    g.matches.slice(i*2, i*2+2).forEach(m => h += matchCard(m));
  });
  return h;
}

function renderKO() {
  let h = `<div class="group-title">🏆 Fase Eliminatoria</div>
  <div class="teams-row"><div class="team-badge">🗓️ 28 Jun – 19 Jul 2026</div></div>`;
  KO_ROUNDS.forEach(r => {
    h += `<div class="ko-round-title">${r.name}</div><div class="ko-date">📅 ${r.range}</div>`;
    r.matches.forEach(match => {
      h += `
      <div class="match-card" style="margin-bottom:10px">
        <div class="match-meta">
          <div class="date-time">📅 <span>${match.d}</span> &nbsp;⏰ <span>${match.t}</span></div>
          <span class="badge badge-upcoming">${match.venue}</span>
        </div>
        <div class="match-row">
          <div class="team">
            <div class="ko-flag-placeholder">🏳️</div>
            <span class="ko-pending-name">Por definir</span>
          </div>
          <div class="score-box">
            <div class="score-display pending"><span>–</span><span class="sep">:</span><span>–</span></div>
            <span class="vs-label">vs</span>
          </div>
          <div class="team">
            <div class="ko-flag-placeholder">🏳️</div>
            <span class="ko-pending-name">Por definir</span>
          </div>
        </div>
      </div>`;
    });
  });
  return h;
}

function showGroup(key, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  document.getElementById('content').innerHTML = key === 'KO' ? renderKO() : renderGroup(key);
}

document.getElementById('content').innerHTML = renderGroup('A');
</script>
